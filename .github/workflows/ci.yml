name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  smoke:
    name: Container smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: phlo-whatsapp:ci

      - name: Refuse to start without WA_SECRET
        run: |
          if docker run --rm phlo-whatsapp:ci; then
            echo "container started with an empty WA_SECRET; it must refuse" && exit 1
          fi

      - name: Health, auth and published-port reachability
        run: |
          docker run -d --name wa -e WA_SECRET=testsecret -p 3000:3000 phlo-whatsapp:ci
          code=000
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -H 'secret: testsecret' http://127.0.0.1:3000/health || true)
            [ "$code" = "200" ] && break
            sleep 1
          done
          if [ "$code" != "200" ]; then echo "health not reachable on the published port (bind?): $code"; docker logs wa; docker rm -f wa; exit 1; fi
          un=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/health)
          docker rm -f wa
          if [ "$un" != "401" ]; then echo "request without the secret must be 401, got $un"; exit 1; fi

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [unit, smoke]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # On a version tag, publish ghcr.io/<owner>/phlo-whatsapp:<version> and :latest.
      # On branches/PRs the image is built but not pushed (smoke test only).
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/phlo-whatsapp
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
